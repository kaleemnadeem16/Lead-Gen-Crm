name: CI / Deploy

# ── Triggers ──────────────────────────────────────────────────────────────────
# Tests run on every PR to main and on every push to main.
# Deploy runs only after tests pass on a push to main (i.e. after PR merge).
# Nothing runs on dev branch pushes — open a PR to main to trigger CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Backend tests ───────────────────────────────────────────────────
  test-backend:
    name: Backend tests (PHP 8.4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, redis, zip, bcmath, pcntl
          coverage: none

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up .env.testing
        run: cp .env.ci .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations on test DB
        run: php artisan migrate --env=testing --force --no-interaction

      - name: Run PHPUnit
        run: php artisan test --env=testing

  # ── Job 2: Frontend tests ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm run test -- --run

  # ── Job 3: Deploy (push to main only, after both test jobs pass) ───────────
  # The Docker images are built on the Oracle ARM VM (native ARM64).
  # GitHub Actions only runs tests — no docker build happens here.
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/apps/x1techs-crm-app

            echo "── Pulling latest code ──"
            git fetch origin main
            git checkout main
            git pull origin main

            echo "── Tagging current images as rollback ──"
            docker tag crm_backend:latest crm_backend:rollback 2>/dev/null || true
            docker tag crm_frontend:latest crm_frontend:rollback 2>/dev/null || true

            echo "── Building images on ARM VM (native ARM64) ──"
            if ! docker compose -f docker-compose.prod.yml build; then
              echo "ERROR: Docker build failed — old containers are still running, nothing changed"
              exit 1
            fi

            echo "── Running migrations (using new image, without stopping live containers) ──"
            if ! docker compose -f docker-compose.prod.yml run --rm backend \
              php artisan migrate --force --no-interaction; then
              echo "ERROR: Migrations failed — rolling back images, nothing restarted"
              docker tag crm_backend:rollback crm_backend:latest 2>/dev/null || true
              docker tag crm_frontend:rollback crm_frontend:latest 2>/dev/null || true
              exit 1
            fi

            echo "── Restarting containers with new images ──"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "── Waiting for containers to stabilise ──"
            sleep 10

            echo "── Health check ──"
            BACKEND_STATUS=$(docker inspect --format='{{.State.Status}}' crm_backend_prod 2>/dev/null || echo "missing")
            FRONTEND_STATUS=$(docker inspect --format='{{.State.Status}}' crm_frontend_prod 2>/dev/null || echo "missing")

            if [ "$BACKEND_STATUS" != "running" ] || [ "$FRONTEND_STATUS" != "running" ]; then
              echo "ERROR: Containers failed to start (backend=$BACKEND_STATUS frontend=$FRONTEND_STATUS)"
              echo "── Rolling back to previous images ──"
              docker tag crm_backend:rollback crm_backend:latest 2>/dev/null || true
              docker tag crm_frontend:rollback crm_frontend:latest 2>/dev/null || true
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              exit 1
            fi

            echo "── Deploy complete ✅ (backend=$BACKEND_STATUS frontend=$FRONTEND_STATUS) ──"
