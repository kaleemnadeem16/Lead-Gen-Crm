name: CI / Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Job 1: Backend tests ───────────────────────────────────────────────────
  test-backend:
    name: Backend tests (PHP 8.4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, redis, zip, bcmath, pcntl
          coverage: none

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up .env.testing
        run: cp .env.ci .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations on test DB
        run: php artisan migrate --env=testing --force --no-interaction

      - name: Run PHPUnit
        run: php artisan test --env=testing

  # ── Job 2: Frontend tests ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend tests + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm run test -- --run

  # ── Job 3: Deploy (push to main only, after both test jobs pass) ──────────
  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/apps/x1techs-crm-app

            echo "── Pulling latest code ──"
            git fetch origin main
            git checkout main
            git pull origin main

            echo "── Building images (native ARM64) ──"
            docker compose -f docker-compose.prod.yml build

            echo "── Running migrations ──"
            docker compose -f docker-compose.prod.yml run --rm backend \
              php artisan migrate --force --no-interaction

            echo "── Restarting containers ──"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "── Clearing caches ──"
            docker compose -f docker-compose.prod.yml exec -T backend \
              php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T backend \
              php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T backend \
              php artisan view:cache

            echo "── Deploy complete ✅ ──"
