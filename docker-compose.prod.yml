services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-bookworm
    container_name: crm_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-bookworm
    container_name: crm_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - crm_redis_data:/data
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: crm_backend:latest
    container_name: crm_backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network

  # ── Horizon (queue worker) ────────────────────────────────────────────────────
  horizon:
    image: crm_backend:latest
    container_name: crm_horizon_prod
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network

  # ── Laravel Scheduler ─────────────────────────────────────────────────────────
  scheduler:
    image: crm_backend:latest
    container_name: crm_scheduler_prod
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    networks:
      - crm_network

  # ── React Frontend (Nginx static) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=https://api-crm.x1techs.com/api/v1
        - VITE_APP_NAME=X1Techs CRM
    image: crm_frontend:latest
    container_name: crm_frontend_prod
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - crm_network

volumes:
  crm_pg_data:
  crm_redis_data:

networks:
  crm_network:
    driver: bridge
